<!DOCTYPE html>
<html>
<head>
    <title>Advanced Styling and JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Advanced Styling and JavaScript</h1>
    <p>Responsive Design, Image Carousel, and API Example</p>
</header>

<section class="carousel">
    <img id="slider" src="https://picsum.photos/id/1015/800/400">
    
    <div class="buttons">
        <button onclick="prevImage()">Previous</button>
        <button onclick="nextImage()">Next</button>
    </div>
</section>

<section class="api">
    <h2>Random Joke API</h2>
    <button onclick="getJoke()">Get Joke</button>
    <p id="joke"></p>
</section>

<script src="script.js"></script>

</body>
</html>
